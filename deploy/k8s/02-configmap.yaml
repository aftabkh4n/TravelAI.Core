apiVersion: v1
kind: ConfigMap
metadata:
  name: travelai-config
  namespace: travelai
data:
  TRAVELAI__ITINERARYGENERATION__DEPLOYMENTNAME: "gpt-4o"
  TRAVELAI__PRICEANOMALY__ANOMALYTHRESHOLDPERCENT: "25"
  TRAVELAI__DESTINATIONSEARCH__INDEXNAME: "destinations"
  TRAVELAI__DESTINATIONSEARCH__SEMANTICCONFIGURATIONNAME: "travel-semantic-config"
  TRAVELAI__BOOKINGAUTOMATION__MAXRETRYATTEMPTS: "3"
  TRAVELAI__BOOKINGAUTOMATION__TIMEOUTSECONDS: "30"
  ASPNETCORE_ENVIRONMENT: "Production"
  DOTNET_RUNNING_IN_CONTAINER: "true"
