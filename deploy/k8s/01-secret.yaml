# DO NOT commit real values here.
# Secrets are injected by GitHub Actions using kubectl create secret.
# To create manually for local testing:
#
#   kubectl create secret generic travelai-secrets \
#     --namespace travelai \
#     --from-literal=azure-openai-endpoint="https://YOUR.openai.azure.com/" \
#     --from-literal=azure-openai-key="YOUR_KEY" \
#     --from-literal=azure-search-endpoint="https://YOUR.search.windows.net" \
#     --from-literal=azure-search-key="YOUR_KEY"
apiVersion: v1
kind: Secret
metadata:
  name: travelai-secrets
  namespace: travelai
type: Opaque
stringData:
  azure-openai-endpoint: ""
  azure-openai-key: ""
  azure-search-endpoint: ""
  azure-search-key: ""
