name: Build → Test → Deploy to AKS

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/travelai-api
  AZURE_RESOURCE_GROUP: rg-travelai-prod
  AKS_CLUSTER_NAME: aks-travelai-prod
  K8S_NAMESPACE: travelai

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test --no-build --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3.9.0

      - name: Build and push Docker image
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AKS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Apply namespace and config
        run: |
          kubectl apply -f deploy/k8s/00-namespace.yaml
          kubectl apply -f deploy/k8s/02-configmap.yaml

      - name: Inject secrets
        run: |
          kubectl create secret generic travelai-secrets \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=azure-openai-endpoint="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=azure-openai-key="${{ secrets.AZURE_OPENAI_KEY }}" \
            --from-literal=azure-search-endpoint="${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
            --from-literal=azure-search-key="${{ secrets.AZURE_SEARCH_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tag
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          sed -i "s|image: ghcr.io/YOUR_GITHUB_USERNAME/travelai-api:latest|image: ${IMAGE_TAG}|g" \
            deploy/k8s/03-deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f deploy/k8s/03-deployment.yaml
          kubectl apply -f deploy/k8s/04-service.yaml
          kubectl apply -f deploy/k8s/05-ingress.yaml
          kubectl apply -f deploy/k8s/06-hpa.yaml
          kubectl apply -f deploy/k8s/07-clusterissuer.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/travelai-api \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=10m

      - name: Verify pods healthy
        run: |
          kubectl wait pods \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --selector app=travelai-api \
            --for condition=Ready \
            --timeout=120s

      - name: Print summary
        run: |
          echo "Deployment complete"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          kubectl get ingress --namespace ${{ env.K8S_NAMESPACE }}
